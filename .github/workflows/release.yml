name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Tagged Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build tagged binaries
        # Current release target is Linux amd64 only; expand with a build matrix when needed.
        run: cargo build -p dharma-cli -p dharma-runtime --release

      - name: Package release assets
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dist
          cp target/release/dh "dist/dh-${TAG}-linux-amd64"
          cp target/release/dhd "dist/dhd-${TAG}-linux-amd64"
          tar -czf "dist/dharma-${TAG}-linux-amd64.tar.gz" -C dist \
            "dh-${TAG}-linux-amd64" \
            "dhd-${TAG}-linux-amd64"
          (
            cd dist
            sha256sum \
              "dh-${TAG}-linux-amd64" \
              "dhd-${TAG}-linux-amd64" \
              "dharma-${TAG}-linux-amd64.tar.gz" \
              > SHA256SUMS.txt
          )

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums (keyless)
        run: |
          cosign sign-blob \
            --yes \
            --output-signature dist/SHA256SUMS.txt.sig \
            --output-certificate dist/SHA256SUMS.txt.pem \
            dist/SHA256SUMS.txt

      - name: Generate changelog for release
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG="$(git tag --sort=-creatordate | grep -Fxv "${TAG}" | head -n 1)"
          {
            echo "# ${TAG}"
            echo
            echo "## Changelog"
            echo
            if [ -n "${PREV_TAG}" ]; then
              git log --no-merges --pretty='- %s (%h)' "${PREV_TAG}..${GITHUB_SHA}"
            else
              git log --no-merges --pretty='- %s (%h)' -n 100 "${GITHUB_SHA}"
            fi
          } > dist/CHANGELOG.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: dist/CHANGELOG.md
          files: dist/*
