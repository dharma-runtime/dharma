name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-matrix:
    name: Build ${{ matrix.target }}
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_suffix: linux-amd64
            archive_ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_suffix: darwin-amd64
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_suffix: windows-amd64
            archive_ext: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-rust
          workspaces: |
            . -> target
          cache-workspace-crates: true
          cache-on-failure: true

      - name: Build tagged binaries
        run: cargo build -p dharma-cli -p dharma-runtime --release --target ${{ matrix.target }}

      - name: Package unix artifacts
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          BIN_DIR="target/${{ matrix.target }}/release"
          mkdir -p dist

          cp "${BIN_DIR}/dh" "dist/dh-${TAG}-${{ matrix.asset_suffix }}"
          cp "${BIN_DIR}/dhd" "dist/dhd-${TAG}-${{ matrix.asset_suffix }}"
          tar -czf "dist/dharma-${TAG}-${{ matrix.asset_suffix }}.tar.gz" -C dist \
            "dh-${TAG}-${{ matrix.asset_suffix }}" \
            "dhd-${TAG}-${{ matrix.asset_suffix }}"

          (
            cd dist
            shasum -a 256 \
              "dh-${TAG}-${{ matrix.asset_suffix }}" \
              "dhd-${TAG}-${{ matrix.asset_suffix }}" \
              "dharma-${TAG}-${{ matrix.asset_suffix }}.tar.gz" \
              > "SHA256SUMS-${{ matrix.target }}.txt"
          )

      - name: Package windows artifacts
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $dh = "dist/dh-$tag-${{ matrix.asset_suffix }}.exe"
          $dhd = "dist/dhd-$tag-${{ matrix.asset_suffix }}.exe"
          $archive = "dist/dharma-$tag-${{ matrix.asset_suffix }}.zip"
          Copy-Item "target/${{ matrix.target }}/release/dh.exe" $dh
          Copy-Item "target/${{ matrix.target }}/release/dhd.exe" $dhd

          Compress-Archive -Path $dh, $dhd -DestinationPath $archive -Force

          $hashes = @()
          foreach ($file in @($dh, $dhd, $archive)) {
            $hash = (Get-FileHash -Algorithm SHA256 $file).Hash.ToLower()
            $hashes += "$hash  $([System.IO.Path]::GetFileName($file))"
          }
          $hashes | Out-File -FilePath "dist/SHA256SUMS-${{ matrix.target }}.txt" -Encoding ascii

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          retention-days: 30

  publish-release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs:
      - build-matrix
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Merge checksum files
        run: |
          set -euo pipefail
          test -n "$(ls dist/SHA256SUMS-*.txt)"
          cat dist/SHA256SUMS-*.txt > dist/SHA256SUMS.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign merged checksums (keyless)
        run: |
          cosign sign-blob \
            --yes \
            --output-signature dist/SHA256SUMS.txt.sig \
            --output-certificate dist/SHA256SUMS.txt.pem \
            dist/SHA256SUMS.txt

      - name: Generate changelog for release
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG="$(git tag --sort=-creatordate | grep -Fxv "${TAG}" | head -n 1)"
          {
            echo "# ${TAG}"
            echo
            echo "## Changelog"
            echo
            if [ -n "${PREV_TAG}" ]; then
              git log --no-merges --pretty='- %s (%h)' "${PREV_TAG}..${GITHUB_SHA}"
            else
              git log --no-merges --pretty='- %s (%h)' -n 100 "${GITHUB_SHA}"
            fi
          } > dist/CHANGELOG.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: dist/CHANGELOG.md
          files: dist/*

  release-report:
    name: Release Report
    if: always()
    runs-on: ubuntu-latest
    needs:
      - build-matrix
      - publish-release
    steps:
      - name: Summarize release lane results
        run: |
          {
            echo "## Release Lane Report"
            echo
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| build-matrix | ${{ needs.build-matrix.result }} |"
            echo "| publish-release | ${{ needs.publish-release.result }} |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Enforce lane outcomes
        run: |
          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            exit 0
          fi
          if [ "${{ needs.build-matrix.result }}" != "success" ] || [ "${{ needs.publish-release.result }}" != "success" ]; then
            echo "Release lane failed."
            exit 1
          fi
