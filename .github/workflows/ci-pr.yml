name: CI PR

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-quality-matrix:
    name: PR Quality (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: true
      matrix:
        toolchain:
          - stable
          - beta
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-pr-rust
          workspaces: |
            . -> target
          cache-workspace-crates: true
          cache-on-failure: true

      - name: Detect changed Rust files
        if: matrix.toolchain == 'stable'
        id: changed-rs
        uses: tj-actions/changed-files@v46
        with:
          files: |
            **/*.rs
          separator: ","
          safe_output: false

      - name: Check formatting on changed Rust files
        if: matrix.toolchain == 'stable' && steps.changed-rs.outputs.any_changed == 'true'
        run: |
          changed_files="${{ steps.changed-rs.outputs.all_changed_files }}"
          IFS=',' read -r -a files <<< "${changed_files}"
          for file in "${files[@]}"; do
            [ -z "${file}" ] && continue
            file="${file%\\}"

            dir="$(dirname "${file}")"
            manifest=""
            while [ "${dir}" != "." ] && [ "${dir}" != "/" ]; do
              if [ -f "${dir}/Cargo.toml" ]; then
                manifest="${dir}/Cargo.toml"
                break
              fi
              dir="$(dirname "${dir}")"
            done

            edition="2021"
            if [ -n "${manifest}" ]; then
              detected="$(awk -F'\"' '/^[[:space:]]*edition[[:space:]]*=/{print $2; exit}' "${manifest}")"
              if [ -n "${detected}" ]; then
                edition="${detected}"
              fi
            fi

            rustfmt --edition "${edition}" --config skip_children=true --check "${file}"
          done

      - name: Run clippy (no deps)
        run: cargo clippy --workspace --exclude dharma-ui --all-targets --no-deps

      - name: Run unit and integration tests
        run: cargo test --workspace --exclude dharma-ui

      - name: Upload failure tickets (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dharma-failure-tickets-pr-${{ matrix.toolchain }}
          if-no-files-found: ignore
          path: tests/failures/DHARMA-FAILURE-*.md
          retention-days: 7

  pr-test:
    name: PR Deterministic Deep Replay
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs:
      - pr-quality-matrix
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-pr-rust
          workspaces: |
            . -> target
          cache-workspace-crates: true
          cache-on-failure: true

      - name: Build release binaries for deterministic replay checks
        run: cargo build -p dharma-cli -p dharma-runtime --release

      - name: Run deterministic deep subset (replay seeds)
        run: |
          for seed in 7 11 42; do
            echo "Running deep replay seed ${seed}"
            ./target/release/dh test --deep --ci --replay "SEED=${seed}"
          done

      - name: Upload failure tickets (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dharma-failure-tickets-pr-deep
          if-no-files-found: ignore
          path: tests/failures/DHARMA-FAILURE-*.md
          retention-days: 7

  pr-coverage:
    name: PR Coverage Summary
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs:
      - pr-quality-matrix
      - pr-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-pr-rust
          workspaces: |
            . -> target
          cache-workspace-crates: true
          cache-on-failure: true

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage artifacts
        run: cargo llvm-cov --workspace --exclude dharma-ui --lcov --summary-only --output-path lcov.info

      - name: Publish coverage summary
        run: |
          cargo llvm-cov report --summary-only > coverage-summary.txt
          {
            echo "## Coverage Summary"
            echo
            echo '```text'
            tail -n 3 coverage-summary.txt
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pr-coverage
          path: |
            lcov.info
            coverage-summary.txt
          retention-days: 14

  pr-security:
    name: PR Security Dependency Review
    if: ${{ vars.ENABLE_DEPENDENCY_REVIEW == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  pr-report:
    name: PR Report
    if: always()
    runs-on: ubuntu-latest
    needs:
      - pr-quality-matrix
      - pr-test
      - pr-coverage
      - pr-security
    steps:
      - name: Summarize lane results
        run: |
          {
            echo "## PR CI Report"
            echo
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| pr-quality-matrix | ${{ needs.pr-quality-matrix.result }} |"
            echo "| pr-test | ${{ needs.pr-test.result }} |"
            echo "| pr-coverage | ${{ needs.pr-coverage.result }} |"
            echo "| pr-security | ${{ needs.pr-security.result }} |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Enforce failure-fast reporting
        run: |
          for result in \
            "${{ needs.pr-quality-matrix.result }}" \
            "${{ needs.pr-test.result }}" \
            "${{ needs.pr-coverage.result }}"; do
            if [ "${result}" != "success" ]; then
              echo "PR lane failed with result: ${result}"
              exit 1
            fi
          done

          security_result="${{ needs.pr-security.result }}"
          if [ "${security_result}" != "success" ] && [ "${security_result}" != "skipped" ]; then
            echo "PR security lane failed with result: ${security_result}"
            exit 1
          fi
